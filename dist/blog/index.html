</p> </header> <astro-island uid="ZnUuON" prefix="r3" component-url="/_astro/BlogFilter.BnJ4_DG4.js" component-export="default" renderer-url="/_astro/client.72uPYZWm.js" props="{&quot;posts&quot;:[1,[[0,{&quot;id&quot;:[0,&quot;hello-garden.md&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;欢迎来到我的数字花园&quot;],&quot;description&quot;:[0,&quot;这是第一篇文章&quot;],&quot;pubDate&quot;:[3,&quot;2023-10-01T00:00:00.000Z&quot;],&quot;status&quot;:[0,&quot;evergreen&quot;],&quot;tags&quot;:[1,[[0,&quot;思考&quot;],[0,&quot;元&quot;]]]}],&quot;body&quot;:[0,&quot;欢迎来到我的数字花园！这里是我记录想法、分享知识的地方。\n\n数字花园是一种新型的写作方式，它不像传统博客那样追求完美的文章，而是像园丁培育植物一样，让想法慢慢生长、演化。每一篇笔记都是一个种子，随着时间的推移，它们会相互连接、生长，形成一个有机的知识网络。\n\n在这个花园里，你会发现各种主题的思考和探索。有些内容可能还在萌芽阶段（seed），有些正在成长（growing），还有一些已经成熟稳定（evergreen）。\n\n如果你对设计系统感兴趣，可以看看 [[设计系统构建]]。&quot;],&quot;filePath&quot;:[0,&quot;src/content/blog/hello-garden.md&quot;],&quot;digest&quot;:[0,&quot;99462c9296db086e&quot;],&quot;rendered&quot;:[0,{&quot;html&quot;:[0,&quot;&lt;p&gt;欢迎来到我的数字花园！这里是我记录想法、分享知识的地方。&lt;/p&gt;\n&lt;p&gt;数字花园是一种新型的写作方式，它不像传统博客那样追求完美的文章，而是像园丁培育植物一样，让想法慢慢生长、演化。每一篇笔记都是一个种子，随着时间的推移，它们会相互连接、生长，形成一个有机的知识网络。&lt;/p&gt;\n&lt;p&gt;在这个花园里，你会发现各种主题的思考和探索。有些内容可能还在萌芽阶段（seed），有些正在成长（growing），还有一些已经成熟稳定（evergreen）。&lt;/p&gt;\n&lt;p&gt;如果你对设计系统感兴趣，可以看看 [[设计系统构建]]。&lt;/p&gt;&quot;],&quot;metadata&quot;:[0,{&quot;headings&quot;:[1,[]],&quot;localImagePaths&quot;:[1,[]],&quot;remoteImagePaths&quot;:[1,[]],&quot;frontmatter&quot;:[0,{&quot;title&quot;:[0,&quot;欢迎来到我的数字花园&quot;],&quot;description&quot;:[0,&quot;这是第一篇文章&quot;],&quot;pubDate&quot;:[0,&quot;2023-10-01&quot;],&quot;status&quot;:[0,&quot;evergreen&quot;],&quot;tags&quot;:[1,[[0,&quot;思考&quot;],[0,&quot;元&quot;]]]}],&quot;imagePaths&quot;:[1,[]]}]}],&quot;collection&quot;:[0,&quot;blog&quot;],&quot;slug&quot;:[0,&quot;hello-garden&quot;],&quot;render&quot;:[0,null]}],[0,{&quot;id&quot;:[0,&quot;ai-coding.md&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;AI辅助编程&quot;],&quot;description&quot;:[0,&quot;用AI写代码的体验&quot;],&quot;pubDate&quot;:[3,&quot;2023-10-20T00:00:00.000Z&quot;],&quot;status&quot;:[0,&quot;seed&quot;],&quot;tags&quot;:[1,[[0,&quot;技术&quot;],[0,&quot;AI&quot;]]]}],&quot;body&quot;:[0,&quot;AI辅助编程正在改变我们写代码的方式。从代码补全到自动生成，AI工具正在成为开发者的得力助手。\n\n使用AI写代码有很多好处：\n- 提高开发效率\n- 减少重复劳动\n- 帮助学习新技术\n- 提供代码审查建议\n\n当然，AI也不是万能的。它生成的代码需要仔细审查，确保正确性和安全性。但不可否认的是，AI正在成为开发者工具箱中不可或缺的一部分。\n\n未来，AI辅助编程的能力还会不断提升，让我们拭目以待。&quot;],&quot;filePath&quot;:[0,&quot;src/content/blog/ai-coding.md&quot;],&quot;digest&quot;:[0,&quot;ee9b22fed83ba831&quot;],&quot;rendered&quot;:[0,{&quot;html&quot;:[0,&quot;&lt;p&gt;AI辅助编程正在改变我们写代码的方式。从代码补全到自动生成，AI工具正在成为开发者的得力助手。&lt;/p&gt;\n&lt;p&gt;使用AI写代码有很多好处：&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;提高开发效率&lt;/li&gt;\n&lt;li&gt;减少重复劳动&lt;/li&gt;\n&lt;li&gt;帮助学习新技术&lt;/li&gt;\n&lt;li&gt;提供代码审查建议&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;当然，AI也不是万能的。它生成的代码需要仔细审查，确保正确性和安全性。但不可否认的是，AI正在成为开发者工具箱中不可或缺的一部分。&lt;/p&gt;\n&lt;p&gt;未来，AI辅助编程的能力还会不断提升，让我们拭目以待。&lt;/p&gt;&quot;],&quot;metadata&quot;:[0,{&quot;headings&quot;:[1,[]],&quot;localImagePaths&quot;:[1,[]],&quot;remoteImagePaths&quot;:[1,[]],&quot;frontmatter&quot;:[0,{&quot;title&quot;:[0,&quot;AI辅助编程&quot;],&quot;description&quot;:[0,&quot;用AI写代码的体验&quot;],&quot;pubDate&quot;:[0,&quot;2023-10-20&quot;],&quot;status&quot;:[0,&quot;seed&quot;],&quot;tags&quot;:[1,[[0,&quot;技术&quot;],[0,&quot;AI&quot;]]]}],&quot;imagePaths&quot;:[1,[]]}]}],&quot;collection&quot;:[0,&quot;blog&quot;],&quot;slug&quot;:[0,&quot;ai-coding&quot;],&quot;render&quot;:[0,null]}],[0,{&quot;id&quot;:[0,&quot;design-system.md&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;设计系统构建&quot;],&quot;description&quot;:[0,&quot;关于设计的思考&quot;],&quot;pubDate&quot;:[3,&quot;2023-10-10T00:00:00.000Z&quot;],&quot;status&quot;:[0,&quot;growing&quot;],&quot;tags&quot;:[1,[[0,&quot;设计&quot;]]]}],&quot;body&quot;:[0,&quot;设计系统是现代前端开发的重要组成部分。它不仅仅是一套UI组件库，更是一套完整的设计语言和规范。\n\n一个好的设计系统应该包含：\n- 设计原则和价值观\n- 色彩系统和排版规范\n- 可复用的UI组件\n- 设计模式和最佳实践\n\n构建设计系统是一个持续迭代的过程。它需要设计师和开发者的紧密协作，不断地收集反馈、优化改进。\n\n通过建立统一的设计语言，可以极大地提高团队的工作效率，确保产品体验的一致性。&quot;],&quot;filePath&quot;:[0,&quot;src/content/blog/design-system.md&quot;],&quot;digest&quot;:[0,&quot;f415af46e5c8d566&quot;],&quot;rendered&quot;:[0,{&quot;html&quot;:[0,&quot;&lt;p&gt;设计系统是现代前端开发的重要组成部分。它不仅仅是一套UI组件库，更是一套完整的设计语言和规范。&lt;/p&gt;\n&lt;p&gt;一个好的设计系统应该包含：&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;设计原则和价值观&lt;/li&gt;\n&lt;li&gt;色彩系统和排版规范&lt;/li&gt;\n&lt;li&gt;可复用的UI组件&lt;/li&gt;\n&lt;li&gt;设计模式和最佳实践&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;构建设计系统是一个持续迭代的过程。它需要设计师和开发者的紧密协作，不断地收集反馈、优化改进。&lt;/p&gt;\n&lt;p&gt;通过建立统一的设计语言，可以极大地提高团队的工作效率，确保产品体验的一致性。&lt;/p&gt;&quot;],&quot;metadata&quot;:[0,{&quot;headings&quot;:[1,[]],&quot;localImagePaths&quot;:[1,[]],&quot;remoteImagePaths&quot;:[1,[]],&quot;frontmatter&quot;:[0,{&quot;title&quot;:[0,&quot;设计系统构建&quot;],&quot;description&quot;:[0,&quot;关于设计的思考&quot;],&quot;pubDate&quot;:[0,&quot;2023-10-10&quot;],&quot;status&quot;:[0,&quot;growing&quot;],&quot;tags&quot;:[1,[[0,&quot;设计&quot;]]]}],&quot;imagePaths&quot;:[1,[]]}]}],&quot;collection&quot;:[0,&quot;blog&quot;],&quot;slug&quot;:[0,&quot;design-system&quot;],&quot;render&quot;:[0,null]}]]]}" ssr client="load" opts="{&quot;name&quot;:&quot;BlogFilter&quot;,&quot;value&quot;:true}" await-children><div><div class="flex gap-3 mb-8 flex-wrap"><button class="px-4 py-2 rounded-full border transition-all bg-purple-500/30 border-purple-500 text-white"> <!-- -->全部</button><button class="px-4 py-2 rounded-full border transition-all bg-transparent border-white/20 text-gray-400 hover:bg-purple-500/20 hover:border-purple-500/50">🌱<!-- --> <!-- -->萌芽</button><button class="px-4 py-2 rounded-full border transition-all bg-transparent border-white/20 text-gray-400 hover:bg-purple-500/20 hover:border-purple-500/50">🌿<!-- --> <!-- -->生长中</button><button class="px-4 py-2 rounded-full border transition-all bg-transparent border-white/20 text-gray-400 hover:bg-purple-500/20 hover:border-purple-500/50">🌳<!-- --> <!-- -->常青</button
