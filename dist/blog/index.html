</p> </header> <astro-island uid="Z1hGuNd" prefix="r3" component-url="/digital-garden/_astro/BlogFilter.B2vKUARH.js" component-export="default" renderer-url="/digital-garden/_astro/client.72uPYZWm.js" props="{&quot;posts&quot;:[1,[[0,{&quot;id&quot;:[0,&quot;ai-coding.md&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;AI辅助编程&quot;],&quot;description&quot;:[0,&quot;用AI写代码的体验&quot;],&quot;pubDate&quot;:[3,&quot;2023-10-20T00:00:00.000Z&quot;],&quot;status&quot;:[0,&quot;seed&quot;],&quot;tags&quot;:[1,[[0,&quot;技术&quot;],[0,&quot;AI&quot;]]]}],&quot;body&quot;:[0,&quot;AI辅助编程正在改变我们写代码的方式。从代码补全到自动生成，AI工具正在成为开发者的得力助手。\n\n使用AI写代码有很多好处：\n- 提高开发效率\n- 减少重复劳动\n- 帮助学习新技术\n- 提供代码审查建议\n\n当然，AI也不是万能的。它生成的代码需要仔细审查，确保正确性和安全性。但不可否认的是，AI正在成为开发者工具箱中不可或缺的一部分。\n\n未来，AI辅助编程的能力还会不断提升，让我们拭目以待。&quot;],&quot;filePath&quot;:[0,&quot;src/content/blog/ai-coding.md&quot;],&quot;digest&quot;:[0,&quot;ee9b22fed83ba831&quot;],&quot;rendered&quot;:[0,{&quot;html&quot;:[0,&quot;&lt;p&gt;AI辅助编程正在改变我们写代码的方式。从代码补全到自动生成，AI工具正在成为开发者的得力助手。&lt;/p&gt;\n&lt;p&gt;使用AI写代码有很多好处：&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;提高开发效率&lt;/li&gt;\n&lt;li&gt;减少重复劳动&lt;/li&gt;\n&lt;li&gt;帮助学习新技术&lt;/li&gt;\n&lt;li&gt;提供代码审查建议&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;当然，AI也不是万能的。它生成的代码需要仔细审查，确保正确性和安全性。但不可否认的是，AI正在成为开发者工具箱中不可或缺的一部分。&lt;/p&gt;\n&lt;p&gt;未来，AI辅助编程的能力还会不断提升，让我们拭目以待。&lt;/p&gt;&quot;],&quot;metadata&quot;:[0,{&quot;headings&quot;:[1,[]],&quot;localImagePaths&quot;:[1,[]],&quot;remoteImagePaths&quot;:[1,[]],&quot;frontmatter&quot;:[0,{&quot;title&quot;:[0,&quot;AI辅助编程&quot;],&quot;description&quot;:[0,&quot;用AI写代码的体验&quot;],&quot;pubDate&quot;:[0,&quot;2023-10-20&quot;],&quot;status&quot;:[0,&quot;seed&quot;],&quot;tags&quot;:[1,[[0,&quot;技术&quot;],[0,&quot;AI&quot;]]]}],&quot;imagePaths&quot;:[1,[]]}]}],&quot;collection&quot;:[0,&quot;blog&quot;],&quot;slug&quot;:[0,&quot;ai-coding&quot;],&quot;render&quot;:[0,null]}],[0,{&quot;id&quot;:[0,&quot;design-system.md&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;设计系统 它固定显示在页面右侧，当读者阅读长篇文章时，可以清晰地感知当前所处的位置。\n\n### 核心特性\n\n这个功能具备以下几个显著特点：\n\n- **智能显示**：仅在桌面端（宽度 ≥ 1024px）显示，移动设备自动隐藏\n- **实时追踪**：使用 Intersection Observer API 精确追踪当前阅读位置\n- **平滑交互**：点击目录项即可平滑滚动到对应章节\n- **视觉清晰**：毛玻璃背景设计，不干扰正常阅读\n\n## 技术实现\n\n让我们深入了解这项功能的技术细节。\n\n### 组件架构\n\n悬浮目录是一个独立的 React 组件，采用客户端渲染方式加载。这种设计确保了组件的复用性和独立性。\n\n### 核心原理\n\n实现高亮追踪功能的关键在于 Intersection Observer API。通过监听每个标题元素的可见性变化，系统可以准确判断用户当前正在阅读哪个部分。\n\n### 样式设计\n\n界面采用了现代化的毛玻璃效果，结合半透明背景和细微边框，既保证了内容的可读性，又提供了优雅的视觉体验。\n\n## 使用场景\n\n在实际应用中，悬浮目录功能适用于多种场景。\n\n### 教程类文章\n\n对于需要分步骤讲解的技术教程，清晰的章节导航可以帮助读者快速定位感兴趣的内容。\n\n### 文档手册\n\n长篇文档往往包含大量章节，悬浮目录让用户无需滚动即可了解文档结构。\n\n### 产品介绍\n\n复杂产品的介绍页面，目录功能可以帮助潜在客户快速了解产品特性。\n\n## 交互细节\n\n了解一些交互细节可以帮助你更好地使用这个功能。\n\n### 滚动行为\n\n当页面滚动时，目录会实时更新高亮状态。高亮的项目会显示绿色竖线指示器，让用户一目了然。\n\n### 点击响应\n\n点击任意目录项，页面会以平滑动画滚动到对应标题位置。这种交互方式比传统锚点跳转更加流畅。\n\n### 响应式适配\n\n在窄屏幕上，目录会自动隐藏以避免遮挡主要内容。这是经过深思熟虑的设计决策，确保移动端用户不会受到影响。\n\n## 自定义配置\n\n如果你想调整目录的样式或行为，可以修改相关代码。\n\n### 调整显示宽度\n\n修改 CSS 中的 `right` 属性可以改变目录的水平位置。\n\n### 修改高亮颜色\n\n在组件中搜索 `bg-emerald-400` 可以找到高亮指示器的颜色定义。\n\n### 调整触发时机\n\n修改 Intersection Observer 的 `rootMargin` 参数可以调整高亮触发的时机。\n\n## 常见问题\n\n以下是一些使用者经常问到的问题。\n\n### 为什么目录没有显示？\n\n请确保浏览器窗口宽度大于 1024 像素。移动端和窄屏设备会自动隐藏目录。\n\n### 高亮不准确怎么办？\n\n这通常是因为页面结构问题。确保文章中的 h2 和 h3 标题具有唯一的 id 属性。\n\n### 可以禁用此功能吗？\n\n目前版本没有提供开关选项，但可以通过修改代码轻松实现。\n\n## 总结\n\n悬浮目录功能为博客文章提供了优雅的导航体验。它不仅提升了长篇文章的可读性，也让读者能够更好地把握文章整体结构。\n\n如果你对这项功能有任何建议或想法，欢迎提出反馈。&quot;],&quot;filePath&quot;:[0,&quot;src/content/blog/floating-toc-guide.md&quot;],&quot;digest&quot;:[0,&quot;9ee1b4ed7881bdbb&quot;],&quot;rendered&quot;:[0,{&quot;html&quot;:[0,&quot;&lt;p&gt;本文将详细介绍博客悬浮目录功能的设计理念、技术实现以及使用方法。&lt;/p&gt;\n&lt;h2 id=\&quot;功能概述\&quot;&gt;功能概述&lt;/h2&gt;\n&lt;p&gt;悬浮目录是一项增强阅读体验的实用功能。它固定显示在页面右侧，当读者阅读长篇文章时，可以清晰地感知当前所处的位置。&lt;/p&gt;\n&lt;h3 id=\&quot;核心特性\&quot;&gt;核心特性&lt;/h3&gt;\n&lt;p&gt;这个功能具备以下几个显著特点：&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;智能显示&lt;/strong&gt;：仅在桌面端（宽度 ≥ 1024px）显示，移动设备自动隐藏&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;实时追踪&lt;/strong&gt
